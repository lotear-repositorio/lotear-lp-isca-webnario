<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Admin — Data do Webinário</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:28px 24px;width:100%;max-width:420px}
  .logo{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#8b949e;margin-bottom:24px;text-align:center}
  h1{font-size:18px;font-weight:600;color:#e6edf3;margin-bottom:4px;text-align:center}
  .subtitle{font-size:13px;color:#8b949e;text-align:center;margin-bottom:28px}
  .current-block{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:14px 16px;margin-bottom:24px}
  .current-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#8b949e;margin-bottom:6px}
  .current-value{font-size:15px;color:#58a6ff;font-weight:500;font-family:'SF Mono',Consolas,monospace}
  .field{margin-bottom:16px}
  label{display:block;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#8b949e;margin-bottom:6px}
  input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px 14px;font-size:15px;color:#e6edf3;outline:none;transition:border-color .15s;-webkit-appearance:none}
  input:focus{border-color:#58a6ff}
  .hint{font-size:11px;color:#8b949e;margin-top:4px}
  .preview-block{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:14px 16px;margin-bottom:24px;display:none}
  .preview-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#8b949e;margin-bottom:8px}
  .preview-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px}
  .preview-key{font-size:12px;color:#8b949e;white-space:nowrap}
  .preview-val{font-size:13px;color:#e6edf3;font-family:'SF Mono',Consolas,monospace;text-align:right}
  .preview-clint{font-size:13px;color:#3fb950;font-family:'SF Mono',Consolas,monospace;text-align:right}
  button{width:100%;background:#238636;border:none;border-radius:8px;padding:14px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:background .15s;margin-top:4px}
  button:hover{background:#2ea043}
  button:disabled{background:#21262d;color:#484f58;cursor:not-allowed}
  .status{margin-top:16px;padding:12px 14px;border-radius:8px;font-size:13px;text-align:center;display:none}
  .status.loading{background:#21262d;color:#8b949e;display:block}
  .status.success{background:#0f2d1a;border:1px solid #2ea043;color:#3fb950;display:block}
  .status.error{background:#2d1317;border:1px solid #f85149;color:#f85149;display:block}
  .deploy-note{font-size:11px;color:#8b949e;text-align:center;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lotear · Admin</div>
  <h1>Atualizar Webinário</h1>
  <p class="subtitle">guia.soulotear.com.br</p>

  <div class="current-block">
    <div class="current-label">Data atual na LP</div>
    <div class="current-value" id="current-display">Carregando...</div>
  </div>

  <div class="field">
    <label>Data do próximo webinário</label>
    <input type="date" id="inp-date" oninput="updatePreview()">
  </div>
  <div class="field">
    <label>Horário</label>
    <input type="time" id="inp-time" value="20:00" oninput="updatePreview()">
    <div class="hint">Padrão: 20:00 (horário de Brasília)</div>
  </div>

  <div class="preview-block" id="preview">
    <div class="preview-label">Pré-visualização</div>
    <div class="preview-row"><span class="preview-key">LP / Popup</span><span class="preview-val" id="prev-display">—</span></div>
    <div class="preview-row"><span class="preview-key">Clint (webhook)</span><span class="preview-clint" id="prev-clint">—</span></div>
    <div class="preview-row"><span class="preview-key">Rodapé curto</span><span class="preview-val" id="prev-short">—</span></div>
  </div>

  <button id="btn-save" onclick="saveDate()" disabled>Atualizar LP</button>
  <div class="status" id="status"></div>
  <div class="deploy-note" id="deploy-note">
    Commit enviado. Aguarde ~2 minutos para o deploy.<br>
    <a href="https://guia.soulotear.com.br" target="_blank" style="color:#58a6ff">Abrir LP para verificar</a>
  </div>
</div>

<script>
const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

function formatDisplay(d,t){var p=d.split('-');var day=parseInt(p[2]),m=parseInt(p[1])-1,y=p[0],h=t.split(':')[0].replace(/^0/,'');return day+' de '+MESES[m]+' de '+y+' · '+h+'h (horário de Brasília)';}
function formatShort(d,t){var p=d.split('-');var h=t.split(':')[0].replace(/^0/,'');return parseInt(p[2])+'/'+p[1]+' às '+h+'h';}
function toClint(d,t){var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]+' '+t;}
function toDDMM(d){var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}

async function loadCurrent(){
  try{
    var r=await fetch('/api/update-webinar',{method:'OPTIONS'});
    // Buscar via GitHub API público (leitura não precisa de token)
    var gr=await fetch('https://api.github.com/repos/lotear-repositorio/lotear-lp-isca-webnario/contents/index.html',{headers:{'User-Agent':'admin-page'}});
    var gd=await gr.json();
    var content=atob(gd.content.replace(/\n/g,''));
    var m=content.match(/webinarDate:\{date:'([^']+)',time:'([^']+)'\}/);
    if(m){
      var p=m[1].split('/');
      var day=parseInt(p[0]),mon=parseInt(p[1])-1,y=p[2],h=m[2].split(':')[0].replace(/^0/,'');
      document.getElementById('current-display').textContent=day+' de '+MESES[mon]+' de '+y+' · '+h+'h';
    } else {
      document.getElementById('current-display').textContent='Não encontrado';
    }
  }catch(e){document.getElementById('current-display').textContent='Erro ao carregar';}
}

function updatePreview(){
  var d=document.getElementById('inp-date').value;
  var t=document.getElementById('inp-time').value;
  var btn=document.getElementById('btn-save');
  if(!d||!t){btn.disabled=true;document.getElementById('preview').style.display='none';return;}
  document.getElementById('prev-display').textContent=formatDisplay(d,t);
  document.getElementById('prev-clint').textContent=toClint(d,t);
  document.getElementById('prev-short').textContent=formatShort(d,t);
  document.getElementById('preview').style.display='block';
  btn.disabled=false;
}

async function saveDate(){
  var d=document.getElementById('inp-date').value;
  var t=document.getElementById('inp-time').value;
  var btn=document.getElementById('btn-save');
  btn.disabled=true;
  var st=document.getElementById('status');
  st.className='status loading'; st.textContent='Enviando...'; st.style.display='block';
  document.getElementById('deploy-note').style.display='none';
  try{
    var r=await fetch('/api/update-webinar',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({date:toDDMM(d),time:t})
    });
    var res=await r.json();
    if(res.ok){
      st.className='status success';
      st.textContent='✓ Commit '+res.sha+' — deploy em ~2 min';
      document.getElementById('deploy-note').style.display='block';
      document.getElementById('current-display').textContent=formatDisplay(d,t);
    } else {
      throw new Error(res.error||'Erro desconhecido');
    }
  }catch(e){
    st.className='status error';
    st.textContent='Erro: '+e.message;
    btn.disabled=false;
  }
}

loadCurrent();
</script>
</body>
</html>
